name: CI/CD - Stock Price Predictor

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements/**"
      - "Dockerfile.serve"
      - "Dockerfile.train"
      - "helm/**"
  schedule:
    # Ежедневное переобучение в 02:00 UTC на свежих данных
    - cron: "0 2 * * *"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stock-predictor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/train.txt

      - name: Run tests
        run: pytest tests/ -v

  train:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      gate_passed: ${{ steps.gate.outputs.passed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/train.txt

      - name: Train model
        working-directory: src
        run: python train.py --ticker AAPL --start 2015-01-01

      - name: Quality gate
        id: gate
        working-directory: src
        run: |
          python evaluate.py --metrics-path ../artifacts/metrics.json
          echo "passed=true" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

  build-and-push:
    needs: train
    if: needs.train.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.serve
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-values:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump image tag in values.yaml
        run: |
          sed -i "s/tag: .*/tag: \"${{ needs.build-and-push.outputs.image_tag }}\"/" \
            helm/stock-predictor/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/stock-predictor/values.yaml
          git diff --cached --quiet || git commit -m "chore: bump image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push

      # Дальше ArgoCD (с включённым automated sync) сам подхватит изменение
      # в values.yaml и раскатит новую версию в кластер — без ручных действий.
