apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cnyrub-predictor.fullname" . }}-config
  labels:
    {{- include "cnyrub-predictor.labels" . | nindent 4 }}
data:
  TICKER: {{ .Values.config.ticker | quote }}
  DATA_SOURCE: {{ .Values.config.dataSource | quote }}
  MOEX_BOARD: {{ .Values.config.moexBoard | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
