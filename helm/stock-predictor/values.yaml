replicaCount: 2

image:
  repository: ghcr.io/your-org/stock-predictor
  # tag обновляется автоматически GitHub Actions после успешного обучения
  # и прохождения quality gate (см. .github/workflows/ci-cd.yaml)
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: stock-predictor.example.com
  tls:
    enabled: false
    secretName: stock-predictor-tls

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Прокидывается в ConfigMap -> env переменные пода
config:
  ticker: "AAPL"
  logLevel: "info"

livenessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
